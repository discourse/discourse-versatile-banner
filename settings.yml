show_for_members:
  type: bool
  default: true
show_for_anon:
  type: bool
  default: true
display_on_mobile:
  type: bool
  default: true
display_on_desktop:
  type: bool
  default: true
display_on_homepage:
  type: bool
  default: true
url_must_contain:
  type: list
  list_type: simple
  default: /latest|/categories|/new|/unread|/top*|/tag/*|/tags/*|/c/*|/t/*
dismissible:
  type: bool
  default: false
collapsible:
  type: bool
  default: false
default_collapsed_state:
  type: enum
  default: collapsed
  choices:
    - expanded
cookie_lifespan:
  type: enum
  default: none
  choices:
    - minute
    - day
    - week
    - month
    - year
cookie_name:
  type: string
  default: "v1"
full_width_banner:
  type: bool
  default: false
swap_default_positioning:
  type: bool
  default: false
plugin_outlet:
  type: enum
  default: "below-site-header"
  choices:
    - "below-site-header"
    - "above-main-container"
    - "discovery-list-controls-above"
    - "header-list-container-bottom"
    - "before-topic-list"
  refresh: true
banner_background_image:
  type: string
  default: "https://i.imgur.com/k7SnZth.jpg"
banner_background_image_dark:
  type: string
  default: ""
background_color:
  type: string
  default: "#EED4A1"
background_color_dark:
  type: string
  default: ""
primary_text_color:
  type: string
  default: "#000"
primary_text_color_dark:
  type: string
  default: ""
secondary_text_color:
  type: string
  default: "#FF6C00"
secondary_text_color_dark:
  type: string
  default: ""
link_text_color:
  type: string
  default: "#0f82af"
link_text_color_dark:
  type: string
  default: ""
first_column_size:
  type: string
  default: "auto"
second_column_size:
  type: string
  default: "auto"
third_column_size:
  type: string
  default: "auto"
fourth_column_size:
  type: string
  default: ""
fifth_column_size:
  type: string
  default: ""
first_column_icon:
  type: string
  default: "gear"
second_column_icon:
  type: string
  default: "https://d11a6trkgmumsb.cloudfront.net/original/3X/b/3/b33be9538df3547fcf9d1a51a4637d77392ac6f9.png"
third_column_icon:
  type: string
  default: "wrench"
